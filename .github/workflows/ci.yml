# Three independent gates (compliance-project pattern): build, typecheck+lint, format.
name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
  SESSION_SECRET: ci-secret-not-real-0000000000000000
  NEXT_PUBLIC_API_URL: http://localhost:4000/graphql

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # Codegen before build: @fd/web imports @/graphql/generated (gitignored),
      # produced by web codegen, which needs api's schema.graphql, which needs the
      # generated Prisma client. Same sequence the typecheck-lint job uses.
      - run: pnpm --filter @fd/db build
      - run: pnpm --filter @fd/api codegen && pnpm --filter @fd/web codegen
      - run: pnpm build

  typecheck-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @fd/db build
      - run: pnpm --filter @fd/api codegen && pnpm --filter @fd/web codegen
      - run: pnpm typecheck
      - run: pnpm lint

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --check "**/*.{ts,tsx,json,md,yml}" --ignore-path .gitignore

  # Browser E2E: embedded PG (headless, no Docker) + seed, then dev servers,
  # then Playwright over the four role UIs. Non-blocking for now (continue-on-
  # error) while the suite stabilises — flip off once green in the pilot.
  e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      # Matches e2e/scripts/ci-db.mjs (embedded PG on :5455, role/db "fd"/"fooddelivery").
      DATABASE_URL: postgresql://fd:fd@localhost:5455/fooddelivery
      SESSION_SECRET: ci-secret-not-real-0000000000000000
      NEXT_PUBLIC_API_URL: http://localhost:4000/graphql
      E2E_WEB_URL: http://localhost:3000
      E2E_API_URL: http://localhost:4000/graphql
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @fd/db build
      - run: pnpm --filter @fd/api codegen && pnpm --filter @fd/web codegen
      - run: pnpm --filter @fd/e2e exec playwright install --with-deps chromium
      # Ephemeral PG + migrate deploy + seed; stays alive in the background.
      - run: node e2e/scripts/ci-db.mjs &
      - name: Wait for Postgres
        run: |
          for i in $(seq 1 60); do
            if pg_isready -h localhost -p 5455 -U fd >/dev/null 2>&1; then echo "pg up"; exit 0; fi
            sleep 2
          done
          echo "postgres did not become ready" >&2; exit 1
      # Start the web (:3000) and api (:4000) dev servers DIRECTLY — not via `turbo dev`,
      # whose interactive UI doesn't stream reliably under non-TTY CI and could leave the
      # api task unstarted (which is exactly why the old `pnpm dev &` timed out on :4000).
      # Background both, wait for BOTH ports, then run Playwright — all in one step so the
      # servers stay alive for its whole duration. Dump the server logs if a port never
      # binds so the failure is diagnosable instead of a bare timeout.
      - name: Run E2E (start servers + Playwright)
        run: |
          pnpm --filter @fd/api dev > /tmp/api.log 2>&1 &
          pnpm --filter @fd/web dev > /tmp/web.log 2>&1 &
          npx --yes wait-on http://localhost:3000 http://localhost:4000/graphql --timeout 180000 \
            || { echo "::group::api.log"; cat /tmp/api.log; echo "::endgroup::"; \
                 echo "::group::web.log"; cat /tmp/web.log; echo "::endgroup::"; exit 1; }
          pnpm --filter @fd/e2e e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
