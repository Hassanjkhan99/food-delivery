name: Security report (redirect)
description: Please do NOT file security issues here — this template only tells you where to go.
title: "security: DO NOT FILE HERE"
labels: ["security"]
body:
  - type: markdown
    attributes:
      value: |
        ## Stop — do not report vulnerabilities in a public issue

        Public disclosure of a security flaw before a fix puts real orders and money at
        risk. Please report privately using one of the channels in
        [SECURITY.md](../SECURITY.md):

        1. **GitHub → Security tab → “Report a vulnerability”** (private advisory), or
        2. **Email** the security contact listed in SECURITY.md.

        We aim to acknowledge within 2 business days.
  - type: checkboxes
    id: understood
    attributes:
      label: Confirmation
      options:
        - label: I understand this is not the place to disclose a vulnerability, and I will use a private channel instead.
          required: true
