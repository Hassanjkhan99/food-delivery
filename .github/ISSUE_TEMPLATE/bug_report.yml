name: Bug report
description: Something is broken or behaves incorrectly.
title: "bug: <short summary>"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. **If this is a security vulnerability, stop** — report it
        privately per [SECURITY.md](../../SECURITY.md), not here.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and its impact.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Do …
        3. See …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - customer web / PWA
        - restaurant console
        - rider PWA
        - admin
        - API / GraphQL
        - database / migrations
        - payments / ledger
        - other
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Branch/commit, OS, browser, Node/pnpm version.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      render: shell
    validations:
      required: false
