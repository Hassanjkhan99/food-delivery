type Branch {
  activeMenu: Menu
  addressText: String!
  deliveryFeeMinor: Int!
  deliveryRadiusM: Int!
  hoursJson: JSON
  id: ID!
  isAcceptingOrders: Boolean!
  lat: Float!
  lng: Float!
  minOrderMinor: Int!
  name: String!
  restaurant: Restaurant!
}

type BranchSearchResult {
  branch: Branch!
  distanceM: Int!
  etaMinutes: Int!
}

input CardInput {
  cvc: String!
  expMonth: Int!
  expYear: Int!
  holderName: String
  number: String!
}

input CartLineInput {
  menuItemId: String!
  modifierOptionIds: [String!]
  notes: String
  qty: Int!
}

scalar DateTime

scalar JSON

type LedgerEntry {
  createdAt: DateTime!
  creditMinor: Int!
  debitMinor: Int!
  id: ID!
  memo: String!
  txId: String!
}

type Menu {
  categories: [MenuCategory!]!
  id: ID!
  layoutJson: JSON
  status: String!
  version: Int!
}

type MenuCategory {
  description: String
  id: ID!
  items: [MenuItem!]!
  name: String!
  sortOrder: Int!
}

type MenuItem {
  badges: [String!]!
  description: String
  id: ID!
  isAvailable: Boolean!
  modifierGroups: [ModifierGroup!]!
  name: String!
  priceMinor: Int!
}

type ModifierGroup {
  id: ID!
  maxSelect: Int!
  minSelect: Int!
  name: String!
  options: [ModifierOption!]!
}

type ModifierOption {
  id: ID!
  isAvailable: Boolean!
  name: String!
  priceDeltaMinor: Int!
}

type Mutation {
  acceptOrder(id: String!, prepEtaMinutes: Int!): Order!
  addPaymentMethod(card: CardInput!): PaymentMethod!
  assignRider(orderId: String!, riderId: String!): Order!
  cancelOrder(id: String!, reason: String): Order!
  deleteMenuItem(itemId: String!): Boolean!
  inviteRider(branchId: String!, name: String!, phone: String!): Rider!
  logout: Boolean!
  markReady(id: String!): Order!
  placeOrder(idempotencyKey: String!, input: PlaceOrderInput!): Order!
  publishMenu(branchId: String!): Menu!
  quoteCart(input: QuoteCartInput!): Quote!
  rejectOrder(id: String!, reason: String!): Order!
  removePaymentMethod(id: String!): Boolean!
  requestOtp(phone: String!): OtpRequestResult!
  setAcceptingOrders(accepting: Boolean!, branchId: String!): Branch!
  setItemAvailability(available: Boolean!, itemId: String!): MenuItem!
  startPreparing(id: String!): Order!
  submitOnboarding(addressText: String!, deliveryFeeMinor: Int!, deliveryRadiusM: Int!, lat: Float!, lng: Float!, minOrderMinor: Int!, name: String!): Restaurant!
  updatePrepEta(id: String!, prepEtaMinutes: Int!): Order!
  upsertCategory(branchId: String!, description: String, id: String, name: String!, sortOrder: Int): MenuCategory!
  upsertMenuItem(badges: [String!], branchId: String!, categoryId: String!, description: String, id: String, name: String!, priceMinor: Int!): MenuItem!
  verifyOtp(code: String!, phone: String!): Viewer!
}

type Order {
  acceptDeadlineAt: DateTime!
  addressSnapshotJson: JSON!
  branch: Branch!
  code: String!
  contactPhone: String!
  customerNote: String
  deliveredAt: DateTime
  deliveryFeeMinor: Int!
  events: [OrderEvent!]!
  grandTotalMinor: Int!
  id: ID!
  items: [OrderItem!]!
  paymentMode: String!
  placedAt: DateTime!
  platformFeeMinor: Int!
  prepEtaMinutes: Int
  status: String!
  subtotalMinor: Int!
  taxTotalMinor: Int!
}

type OrderEvent {
  actorRole: String
  createdAt: DateTime!
  fromStatus: String
  id: ID!
  reason: String
  toStatus: String!
}

type OrderItem {
  id: ID!
  lineTotalMinor: Int!
  menuSnapshotJson: JSON!
  notes: String
  qty: Int!
  unitPriceMinor: Int!
}

type OtpRequestResult {
  devCode: String
}

type PaymentMethod {
  brand: String!
  expMonth: Int!
  expYear: Int!
  id: ID!
  isDefault: Boolean!
  last4: String!
}

type Payout {
  amountMinor: Int!
  id: ID!
  paidAt: DateTime
  periodEnd: DateTime!
  periodStart: DateTime!
  reference: String
  status: String!
}

input PlaceOrderInput {
  addressLabel: String
  addressText: String!
  branchId: String!
  contactPhone: String!
  customerNote: String
  deliveryLat: Float!
  deliveryLng: Float!
  lines: [CartLineInput!]!
  paymentMethodId: String
  paymentMode: String!
}

type Query {
  boardOrders(branchId: String!, statuses: [String!]): [Order!]!
  branchBySlug(slug: String!): Branch
  branchRiders(branchId: String!): [Rider!]!
  browseBranches(lat: Float!, lng: Float!): [BranchSearchResult!]!
  draftMenu(branchId: String!): Menu!
  myOrders: [Order!]!
  myPaymentMethods: [PaymentMethod!]!
  myRestaurants: [Restaurant!]!
  order(id: String!): Order
  payoutHistory(restaurantId: String!): [Payout!]!
  viewer: Viewer
  walletBalance(restaurantId: String!): Int!
  walletStatement(restaurantId: String!): [LedgerEntry!]!
}

type Quote {
  branchId: String!
  deliveryFeeMinor: Int!
  distanceM: Int!
  grandTotalMinor: Int!
  inRadius: Boolean!
  lines: [QuoteLine!]!
  meetsMinimum: Boolean!
  minOrderMinor: Int!
  platformFeeMinor: Int!
  subtotalMinor: Int!
  taxTotalMinor: Int!
}

input QuoteCartInput {
  branchId: String!
  deliveryLat: Float!
  deliveryLng: Float!
  lines: [CartLineInput!]!
}

type QuoteLine {
  lineTotalMinor: Int!
  menuItemId: String!
  name: String!
  qty: Int!
  unitPriceMinor: Int!
}

type Restaurant {
  avgRating: Float
  branches: [Branch!]!
  id: ID!
  name: String!
  ratingCount: Int!
  slug: String!
  status: String!
  theme: RestaurantTheme
  tier: String!
}

type RestaurantTheme {
  accentColor: String!
  backgroundColor: String!
  cardStyle: String!
  fontKey: String!
  heroEffect: String!
  id: ID!
  primaryColor: String!
  textColor: String!
}

type Rider {
  id: ID!
  isOnline: Boolean!
  riderType: String!
  user: User!
  verificationStatus: String!
}

type RoleBinding {
  restaurantId: String
  role: String!
}

type User {
  email: String
  id: ID!
  name: String
  phone: String!
}

type Viewer {
  home: String!
  roles: [RoleBinding!]!
  user: User!
}